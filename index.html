<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>estellepi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --paper: #f5f3ee;
      --muted: #9a9890;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Helvetica Neue', Helvetica, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      background: var(--paper);
      border-bottom: 0.5px solid rgba(26,26,24,0.1);
    }

    .nav-name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 20px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    /* ── MASONRY GRID ── */
    .grid {
      padding: 32px 40px 80px;
      columns: 3;
      column-gap: 12px;
    }

    @media (max-width: 900px) { .grid { columns: 2; } }
    @media (max-width: 560px) { .grid { columns: 1; padding: 20px; } }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #d8d4cc;
    }

    /* span variants — add class="span-tall" or "span-wide" to items */
    .grid-item img,
    .grid-item .placeholder {
      display: block;
      width: 100%;
      transition: transform 0.6s ease, opacity 0.3s;
    }

    .grid-item:hover img,
    .grid-item:hover .placeholder { transform: scale(1.03); }

    .grid-item .placeholder {
      aspect-ratio: var(--ratio, 4/3);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* hover caption overlay */
    .grid-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,26,24,0.55) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      display: flex;
      align-items: flex-end;
      padding: 16px 18px;
      pointer-events: none;
    }

    .grid-item:hover .overlay { opacity: 1; }

    .overlay-text .o-title {
      font-family: var(--serif);
      font-size: 16px;
      font-style: italic;
      color: #f5f3ee;
      display: block;
      line-height: 1.3;
    }

    .overlay-text .o-meta {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(245,243,238,0.65);
      display: block;
      margin-top: 2px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(26,26,24,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 86vh;
      object-fit: contain;
      display: block;
    }

    .lightbox .placeholder-lb {
      width: 70vw;
      height: 70vh;
    }

    .lb-caption {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    .lb-caption .lb-title {
      font-family: var(--serif);
      font-size: 20px;
      font-style: italic;
      font-weight: 300;
      color: #f5f3ee;
      letter-spacing: 0.02em;
    }

    .lb-caption .lb-meta {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(245,243,238,0.5);
      margin-top: 4px;
    }

    .lb-close {
      position: absolute;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      color: rgba(245,243,238,0.5);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      font-weight: 300;
    }
    .lb-close:hover { color: #f5f3ee; }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(245,243,238,0.4);
      cursor: pointer;
      padding: 16px;
      transition: color 0.2s;
    }
    .lb-arrow:hover { color: #f5f3ee; }
    .lb-arrow-prev { left: 16px; }
    .lb-arrow-next { right: 16px; }
    .lb-arrow svg { display: block; width: 24px; height: 24px; }

    .lb-counter {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(245,243,238,0.4);
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-name" href="#">estellepi</a>
    <ul class="nav-links">
      <li><a href="#">Work</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="grid" id="grid"></div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lb-close" aria-label="Close">×</button>
    <div class="lb-counter" id="lb-counter"></div>
    <div id="lb-img-wrap"></div>
    <div class="lb-caption">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-meta" id="lb-meta"></div>
    </div>
    <button class="lb-arrow lb-arrow-prev" id="lb-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M15 4l-8 8 8 8"/></svg>
    </button>
    <button class="lb-arrow lb-arrow-next" id="lb-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 4l8 8-8 8"/></svg>
    </button>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // PHOTOS CONFIG
    // src:   your image filename, e.g. "images/tokyo.jpg"
    // title: caption in lightbox
    // meta:  location / year
    // ratio: controls height in grid — try "3/4" (portrait),
    //        "4/3" (landscape), "1/1" (square), "2/3" (tall)
    // ─────────────────────────────────────────────────────────────
    const photos = [
      { src: "", bg: "#b8b0a4", ratio: "2/3",  title: "Golden hour",    meta: "Kyoto · 2024" },
      { src: "", bg: "#a0aaa4", ratio: "4/3",  title: "Still water",    meta: "Lake Como · 2024" },
      { src: "", bg: "#c4b49c", ratio: "1/1",  title: "Light & shadow", meta: "Lisbon · 2023" },
      { src: "", bg: "#8c9cac", ratio: "3/4",  title: "Early morning",  meta: "Iceland · 2023" },
      { src: "", bg: "#b4b8a8", ratio: "4/3",  title: "Solitude",       meta: "Patagonia · 2022" },
      { src: "", bg: "#a8a09c", ratio: "2/3",  title: "Narrow street",  meta: "Naples · 2023" },
      { src: "", bg: "#c0b8ac", ratio: "1/1",  title: "Rooftop",        meta: "Tokyo · 2024" },
      { src: "", bg: "#9cb0b8", ratio: "4/3",  title: "Coastline",      meta: "Algarve · 2022" },
    ];
    // ─────────────────────────────────────────────────────────────

    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lbImgWrap = document.getElementById('lb-img-wrap');
    const lbTitle = document.getElementById('lb-title');
    const lbMeta = document.getElementById('lb-meta');
    const lbCounter = document.getElementById('lb-counter');

    let current = 0;

    // Build grid
    photos.forEach((p, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';

      if (p.src) {
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = p.title;
        img.loading = 'lazy';
        item.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.style.background = p.bg;
        ph.style.setProperty('--ratio', p.ratio);
        ph.textContent = p.title;
        item.appendChild(ph);
      }

      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      overlay.innerHTML = `<div class="overlay-text"><span class="o-title">${p.title}</span><span class="o-meta">${p.meta}</span></div>`;
      item.appendChild(overlay);

      item.addEventListener('click', () => openLightbox(i));
      grid.appendChild(item);
    });

    function openLightbox(i) {
      current = i;
      renderLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const p = photos[current];
      lbImgWrap.innerHTML = '';

      if (p.src) {
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = p.title;
        lbImgWrap.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'placeholder-lb';
        ph.style.background = p.bg;
        lbImgWrap.appendChild(ph);
      }

      lbTitle.textContent = p.title;
      lbMeta.textContent  = p.meta;
      lbCounter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(photos.length).padStart(2,'0')}`;
    }

    function prevPhoto() { current = (current - 1 + photos.length) % photos.length; renderLightbox(); }
    function nextPhoto() { current = (current + 1) % photos.length; renderLightbox(); }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prevPhoto);
    document.getElementById('lb-next').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextPhoto();
      if (e.key === 'ArrowLeft')  prevPhoto();
    });

    // touch swipe in lightbox
    let tx = null;
    lightbox.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
    lightbox.addEventListener('touchend', e => {
      if (tx === null) return;
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 40) { dx < 0 ? nextPhoto() : prevPhoto(); }
      tx = null;
    });
  </script>
</body>
</html>
