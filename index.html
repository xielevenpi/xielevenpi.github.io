<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>estellepi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --paper: #f5f3ee;
      --muted: #9a9890;
      --serif: 'Jost', sans-serif;
      --sans: 'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 40px;
      background: var(--paper);
      border-bottom: 0.5px solid rgba(26,26,24,0.1);
    }

    .nav-name {
      font-family: var(--serif);
      font-weight: 300;
      font-size: 20px;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    /* ── SECTION NAV ── */
    .section-nav {
      position: sticky;
      top: 73px;
      z-index: 90;
      background: var(--paper);
      border-bottom: 0.5px solid rgba(26,26,24,0.08);
      padding: 0 40px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .section-nav::-webkit-scrollbar { display: none; }

    .section-nav a {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-decoration: none;
      padding: 14px 20px 12px;
      white-space: nowrap;
      border-bottom: 1.5px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .section-nav a:hover { color: var(--ink); }
    .section-nav a.active { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── SECTION HEADING ── */
    .section-heading {
      break-inside: avoid;
      margin-bottom: 12px;
      padding: 28px 0 8px;
      column-span: all;
    }

    .section-heading h2 {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.01em;
      color: var(--ink);
      line-height: 1;
    }

    /* ── MASONRY GRID ── */
    .grid {
      padding: 32px 40px 80px;
      columns: 3;
      column-gap: 12px;
    }

    @media (max-width: 900px) { .grid { columns: 2; } }
    @media (max-width: 560px) { .grid { columns: 1; padding: 20px; } }

    .grid-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: #d8d4cc;
    }

    /* span variants — add class="span-tall" or "span-wide" to items */
    .grid-item img,
    .grid-item .placeholder {
      display: block;
      width: 100%;
      transition: transform 0.6s ease, opacity 0.3s;
    }

    .grid-item:hover img,
    .grid-item:hover .placeholder { transform: scale(1.03); }

    .grid-item .placeholder {
      aspect-ratio: var(--ratio, 4/3);
      display: flex;
      align-items: flex-end;
      padding: 16px;
      font-family: var(--serif);
      font-style: italic;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    /* hover caption overlay */
    .grid-item .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(26,26,24,0.55) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      display: flex;
      align-items: flex-end;
      padding: 16px 18px;
      pointer-events: none;
    }

    .grid-item:hover .overlay { opacity: 1; }

    .overlay-text .o-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 300;
      color: #f5f3ee;
      display: block;
      line-height: 1.3;
    }

    .overlay-text .o-meta {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(245,243,238,0.65);
      display: block;
      margin-top: 2px;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(26,26,24,0.96);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox img {
      max-width: 88vw;
      max-height: 86vh;
      object-fit: contain;
      display: block;
    }

    .lightbox .placeholder-lb {
      width: 70vw;
      height: 70vh;
    }

    .lb-caption {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    .lb-caption .lb-title {
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 300;
      color: #f5f3ee;
      letter-spacing: 0.02em;
    }

    .lb-caption .lb-meta {
      font-size: 10px;
      letter-spacing: 0.06em;
      color: rgba(245,243,238,0.5);
      margin-top: 4px;
    }

    .lb-close {
      position: absolute;
      top: 24px;
      right: 28px;
      background: none;
      border: none;
      color: rgba(245,243,238,0.5);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      font-weight: 300;
    }
    .lb-close:hover { color: #f5f3ee; }

    .lb-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(245,243,238,0.4);
      cursor: pointer;
      padding: 16px;
      transition: color 0.2s;
    }
    .lb-arrow:hover { color: #f5f3ee; }
    .lb-arrow-prev { left: 16px; }
    .lb-arrow-next { right: 16px; }
    .lb-arrow svg { display: block; width: 24px; height: 24px; }

    .lb-counter {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: rgba(245,243,238,0.4);
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-name" href="#">estellepi</a>
    <ul class="nav-links">
      <li><a href="#">work</a></li>
      <li><a href="#">about</a></li>
      <li><a href="#">contact</a></li>
    </ul>
  </nav>

  <nav class="section-nav" id="section-nav">
    <a href="#okinawa">okinawa on iphone</a>
    <a href="#clarke-quay">clarke quay on sony</a>
    <a href="#cbd">cbd</a>
    <a href="#vintage">vintage vibes</a>
  </nav>

  <div class="grid" id="grid"></div>


  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lb-close" aria-label="Close">×</button>
    <div class="lb-counter" id="lb-counter"></div>
    <div id="lb-img-wrap"></div>
    <div class="lb-caption">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-meta" id="lb-meta"></div>
    </div>
    <button class="lb-arrow lb-arrow-prev" id="lb-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M15 4l-8 8 8 8"/></svg>
    </button>
    <button class="lb-arrow lb-arrow-next" id="lb-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M9 4l8 8-8 8"/></svg>
    </button>
  </div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // PHOTOS CONFIG
    // src:   your image filename, e.g. "images/tokyo.jpg"
    // title: caption in lightbox
    // meta:  location / year
    // ratio: controls height in grid — try "3/4" (portrait),
    //        "4/3" (landscape), "1/1" (square), "2/3" (tall)
    // ─────────────────────────────────────────────────────────────
    // ─────────────────────────────────────────────────────────────
    // SECTIONS CONFIG
    // Each section has an id (matches href in nav), a label, and photos.
    // For each photo:
    //   src:   e.g. "images/photo.jpg" (leave "" for placeholder)
    //   title: shown on hover + lightbox
    //   meta:  shown in lightbox
    //   ratio: "2/3" tall | "3/4" portrait | "1/1" square | "4/3" landscape
    // ─────────────────────────────────────────────────────────────
    const sections = [
      {
        id: "okinawa",
        label: "okinawa on iphone",
        photos: [
          { src: "images/photogjapan1.JPG", ratio: "3/4",  title: "kokusai doori",            meta: "okinawa" },
          { src: "images/photogjapan2.JPG", ratio: "4/3",  title: "angama",                   meta: "okinawa" },
          { src: "images/photogjapan3.JPG", ratio: "1/1",  title: "makishi public market",    meta: "okinawa" },
          { src: "images/photogjapan4.JPG", ratio: "2/3",  title: "american village",         meta: "okinawa" },
          { src: "images/photogjapan5.JPG", ratio: "3/4",  title: "ojiisan on bike",          meta: "okinawa" },
          { src: "images/photogjapan6.JPG", ratio: "9/16",  title: "todoroki waterfall",       meta: "okinawa" },
          { src: "images/photogjapan7.JPG", ratio: "1/1",  title: "we are open",              meta: "okinawa" },
          { src: "images/photogjapan8.JPG", ratio: "2/3",  title: "most confident vending machine", meta: "okinawa" },
        ]
      },
      {
        id: "clarke-quay",
        label: "clarke quay on sony",
        photos: [
          { src: "images/clarkequay1.JPG", ratio: "9/16",  title: "funan dessert",            meta: "clarke quay on sony" },
          { src: "", bg: "#a89080", ratio: "2/3",  title: "Riverside",       meta: "Clarke Quay · 2024" },
          { src: "", bg: "#b8a898", ratio: "3/4",  title: "Night crowd",     meta: "Clarke Quay · 2024" },
          { src: "", bg: "#ccc0b0", ratio: "1/1",  title: "Lanterns",        meta: "Clarke Quay · 2024" },
        ]
      },
      {
        id: "cbd",
        label: "cbd",
        photos: [
          { src: "", bg: "#9aa4b0", ratio: "2/3",  title: "Glass towers",   meta: "Singapore · 2024" },
          { src: "", bg: "#b0bcc8", ratio: "4/3",  title: "Lunchtime",      meta: "Singapore · 2024" },
          { src: "", bg: "#8898a8", ratio: "1/1",  title: "Shadow play",    meta: "Singapore · 2024" },
          { src: "", bg: "#a4b4c0", ratio: "3/4",  title: "Underpass",      meta: "Singapore · 2024" },
        ]
      },
      {
        id: "vintage",
        label: "vintage vibes",
        photos: [
          { src: "", bg: "#c4b49c", ratio: "3/4",  title: "Grain & light",  meta: "2023" },
          { src: "", bg: "#b8a888", ratio: "1/1",  title: "Faded film",     meta: "2023" },
          { src: "", bg: "#ccc0a4", ratio: "4/3",  title: "Warm tones",     meta: "2022" },
          { src: "", bg: "#b0a090", ratio: "2/3",  title: "Old town",       meta: "2022" },
        ]
      },
    ];
    // ─────────────────────────────────────────────────────────────

    // Flatten all photos for lightbox indexing
    const allPhotos = sections.flatMap(s => s.photos);

    const grid = document.getElementById('grid');
    const lightbox = document.getElementById('lightbox');
    const lbImgWrap = document.getElementById('lb-img-wrap');
    const lbTitle = document.getElementById('lb-title');
    const lbMeta = document.getElementById('lb-meta');
    const lbCounter = document.getElementById('lb-counter');

    let current = 0;
    let globalIndex = 0;

    // Build grid with section headings
    sections.forEach(section => {
      // Section anchor + heading
      const heading = document.createElement('div');
      heading.className = 'section-heading';
      heading.id = section.id;
      heading.innerHTML = `<h2>${section.label}</h2>`;
      grid.appendChild(heading);

      section.photos.forEach(p => {
        const idx = globalIndex++;
        const item = document.createElement('div');
        item.className = 'grid-item';

        if (p.src) {
          const img = document.createElement('img');
          img.src = p.src;
          img.alt = p.title;
          img.loading = 'lazy';
          item.appendChild(img);
        } else {
          const ph = document.createElement('div');
          ph.className = 'placeholder';
          ph.style.background = p.bg;
          ph.style.setProperty('--ratio', p.ratio);
          ph.textContent = p.title;
          item.appendChild(ph);
        }

        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        overlay.innerHTML = `<div class="overlay-text"><span class="o-title">${p.title}</span><span class="o-meta">${p.meta}</span></div>`;
        item.appendChild(overlay);

        item.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(item);
      });
    });

    // Highlight active section nav link on scroll
    const sectionEls = sections.map(s => document.getElementById(s.id));
    const navLinks = document.querySelectorAll('.section-nav a');

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          navLinks.forEach(a => a.classList.remove('active'));
          const link = document.querySelector(`.section-nav a[href="#${entry.target.id}"]`);
          if (link) link.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });

    sectionEls.forEach(el => { if (el) observer.observe(el); });

    function openLightbox(i) {
      current = i;
      renderLightbox();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function renderLightbox() {
      const p = allPhotos[current];
      lbImgWrap.innerHTML = '';

      if (p.src) {
        const img = document.createElement('img');
        img.src = p.src;
        img.alt = p.title;
        lbImgWrap.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'placeholder-lb';
        ph.style.background = p.bg;
        lbImgWrap.appendChild(ph);
      }

      lbTitle.textContent = p.title;
      lbMeta.textContent  = p.meta;
      lbCounter.textContent = `${String(current + 1).padStart(2,'0')} / ${String(allPhotos.length).padStart(2,'0')}`;
    }

    function prevPhoto() { current = (current - 1 + allPhotos.length) % allPhotos.length; renderLightbox(); }
    function nextPhoto() { current = (current + 1) % allPhotos.length; renderLightbox(); }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', prevPhoto);
    document.getElementById('lb-next').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextPhoto();
      if (e.key === 'ArrowLeft')  prevPhoto();
    });

    // touch swipe in lightbox
    let tx = null;
    lightbox.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
    lightbox.addEventListener('touchend', e => {
      if (tx === null) return;
      const dx = e.changedTouches[0].clientX - tx;
      if (Math.abs(dx) > 40) { dx < 0 ? nextPhoto() : prevPhoto(); }
      tx = null;
    });
  </script>
</body>
</html>
